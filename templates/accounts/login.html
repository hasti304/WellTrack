{% extends "base.html" %}
{% load widget_tweaks %}
{% block title %}Login — Welltrack{% endblock %}
{% block content %}
<h1 class="h2 mb-4">Sign in</h1>
<form method="post" class="col-lg-5">
  {% csrf_token %}
  {% for field in form %}
    <div class="mb-3">
      <label class="form-label" for="{{ field.id_for_label }}">{{ field.label }}</label>
      {% render_field field class+="form-control" %}
      {{ field.errors }}
    </div>
  {% endfor %}
  <button type="submit" class="btn btn-primary">Login</button>
</form>
<hr class="my-4 col-lg-5">
<p class="text-muted">Or continue with Google</p>
<a class="btn btn-outline-dark" href="{% url 'social:begin' 'google-oauth2' %}">Google</a>
{% endblock %}
