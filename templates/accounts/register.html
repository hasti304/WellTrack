{% extends "base.html" %}
{% block title %}Register — Welltrack{% endblock %}
{% block content %}
<h1 class="h2 mb-4">Create account</h1>
<form method="post" novalidate class="col-lg-6">
  {% csrf_token %}
  {% for field in form %}
    <div class="mb-3">
      <label class="form-label" for="{{ field.id_for_label }}">{{ field.label }}</label>
      {{ field.errors }}
      {{ field }}
      {% if field.help_text %}<div class="form-text">{{ field.help_text }}</div>{% endif %}
    </div>
  {% endfor %}
  <button type="submit" class="btn btn-primary">Register</button>
</form>
{% endblock %}
