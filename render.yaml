# Render Blueprint: Web Service + PostgreSQL
# Dashboard → New → Blueprint → Connect this repo (uses runtime.txt for Python 3.12.x).
# After first deploy, set CSRF_TRUSTED_ORIGINS to https://<your-service>.onrender.com
# and add LLM_* keys so Smart Coach / 7-day plan work.

databases:
  - name: welltrack-db
    plan: free
    databaseName: welltrack
    user: welltrack

services:
  - type: web
    name: welltrack
    runtime: python
    plan: free
    buildCommand: pip install -r requirements-production.txt && python manage.py collectstatic --noinput
    startCommand: python manage.py migrate --noinput && gunicorn welltrack.wsgi:application --bind 0.0.0.0:$PORT
    healthCheckPath: /health/
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: welltrack-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: RAG_ENABLED
        value: "False"
      - key: CSRF_TRUSTED_ORIGINS
        sync: false
      - key: LLM_PROVIDER
        value: openai
      - key: LLM_API_KEY
        sync: false
      - key: LLM_MODEL
        sync: false
